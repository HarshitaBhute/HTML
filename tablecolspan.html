<!DOCTYPE html>
<html>
<head>
    <title>Employee Table Example</title>
</head>
<body>

<table border="1" cellpadding="10" align="center">
    <caption><h2>Employee Table</h2></caption>

    <thead>
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Position</th>
            <th>Department</th>
            <th>Salary</th>
            <th>Incentive</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>1</td>
            <td>John</td>
            <td>Manager</td>
            <td>Sales</td>
            <td>75,000</td>
            <td>15,000</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Smith</td>
            <td>Developer</td>
            <td>IT</td>
            <td colspan="2" align="center">70,000</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Johnson</td>
            <td>Developer</td>
            <td>IT</td>
            <td colspan="2" align="center">65,000</td>
        </tr>
    </tbody>

</table>

</body>
</html>
