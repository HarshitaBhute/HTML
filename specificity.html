<!DOCTYPE html>
<html>
<head>
    <title>Specificity Example</title>

    <style>
        p {
            color: black;
        } /* Element Selector */

        .special {
            color: blue;
        } /* Class Selector */

        #unique {
            color: green;
        } /* ID Selector */
    </style>

</head>
<body>

    <p id="unique" class="special" style="color: red;">
        This is a paragraph.
    </p>

</body>
</html>
