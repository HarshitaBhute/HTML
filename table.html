<!DOCTYPE html>
<html>
<head>
    <title>Employee Table Example</title>
</head>
<body>

<table border="1" cellpadding="10" cellspacing="2" align="center" width="800" height="200">
    <caption><h2>Employee Table</h2></caption>

    <thead>
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Position</th>
            <th>Department</th>
            <th>Salary</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>1</td>
            <td>John</td>
            <td>Manager</td>
            <td>Sales</td>
            <td>50000</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Emma</td>
            <td>Developer</td>
            <td>IT</td>
            <td>40000</td>
        </tr>

        <tr>
            <td>3</td>
            <td>David</td>
            <td>Designer</td>
            <td>Marketing</td>
            <td>35000</td>
        </tr>
    </tbody>

</table>

</body>
</html>
